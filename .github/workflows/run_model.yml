name: Semi-Weekly Smart Hunter

on:
  schedule:
    - cron: '0 18 * * 2,5' -> Runs at 18:00, only on Tuesday and Friday
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-hunter-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v3

      - name: Set Up Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Run Backtest Model
        run: |
          python backtest_model.py

      - name: Automatically Commit and Push Updated Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add backtest_results.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Broad Market Backtest Run [skip ci]" && git push)
