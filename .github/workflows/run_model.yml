name: Semi-Weekly Smart Hunter

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Enter Target Date (YYYY-MM-DD)'
        required: false
        default: ''

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/uses/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance numpy

      - name: Run Model
        env:
          # यही वो लाइन है जो इनपुट को पाइथन कोड तक भेजेगी!
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: |
          python backtest_model.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add backtest_results.csv
          git commit -m "Automated Broad Market Backtest Run [skip ci]" || echo "No changes to commit"
          git push
