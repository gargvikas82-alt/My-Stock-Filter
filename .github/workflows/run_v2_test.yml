name: Stock Hunter v2 (Early-Stage Screener - Test)

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: 'FROM_DATE - point-in-time date to run the screener on (YYYY-MM-DD)'
        required: true
      to_date:
        description: 'TO_DATE - evaluation date to measure return until (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance numpy requests

      - name: Run Screener
        env:
          FROM_DATE: ${{ github.event.inputs.from_date }}
          TO_DATE: ${{ github.event.inputs.to_date }}
        run: |
          python stock_hunter_v2.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_hunter_v2_results.csv stock_hunter_v2_skipped.csv backtest_run_log.csv
          git commit -m "Stock Hunter v2 test run [skip ci]" || echo "No changes to commit"
          git push
